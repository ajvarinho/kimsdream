<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description">

      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Climate+Crisis&display=swap" rel="stylesheet">
      <link href="style.css" rel="stylesheet">
      <link rel="icon" type="image/png" href="./public/img/me.png"/>
      <title>dizni</title>
   </head>
   <body>

        <svg xmlns="http://www.w3.org/2000/svg" version="2.0" style="height: 0;">
            <defs>
                <filter id="honeycomb" x="0" y="0" width="1200" height="1000" filterUnits="userSpaceOnUse">

                    <!-- Smaller tile → more spacing -->
                    <feImage href="./assets/img/gl.png" result="img" x="0" y="0" width="250" height="250" />

                    <feTile in="img" result="tile1" />

                    <!-- Increase offsets for staggered rows -->
                    <feOffset in="tile1" dx="150" dy="150" result="tile2" />

                    <feMerge>
                        <feMergeNode in="tile1" />
                        <feMergeNode in="tile2" />
                    </feMerge>

                    </filter>

                
                <filter id="pattern-reverse" x="0" y="0" width="1200" height="900" filterUnits="userSpaceOnUse">
                    <feImage href="./assets/img/gl.png" result="img2" x="100" y="100" width="150" height="300" />
                    <feTile in="img2" result="tiles-rotated" />
                </filter>

                <filter id="blur">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
                </filter>

                <pattern id="pattern-image" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
                    <image xlink:href="./assets/img/gl.png" x="0" y="0" width="150" height="150"></image>
                </pattern>

                <filter id="img-effect" x="0%" y="0%" width="100%" height="100%">

                    <feTurbulence type="turbulence" baseFrequency="0.0035" result="NOISE" numOctaves="2">
                        <animate id="animate" attributeName="baseFrequency" values="0.0035; 0.0025; 0.0035" dur="4s" repeatcount="indefinite" calcmode="spline" keytimes="0; 0.5; 1" keysplines="0.42 0 0.58 1; 0.42 0 0.58 1">
                            <animate attributename="seed" from="1" to="200" dur="12s" repeatcount="indefinite"> </animate>
                        </animate>
                    </feTurbulence>
                    <feDisplacementMap in="SourceGraphic" in2="NOISE" scale="20" xChannelSelector="R" yChannelSelector="R"></feDisplacementMap>

                </filter>
            </defs>

        </svg>

        <header>
            <p class="title climate-crisis">KIM'S</p>
            <p class="title climate-crisis">DREAMS</p>
        </header>

        <section class="first-screen">

            <div class="bg-wrap">
                <div class="dmz-wrap">
                </div>

                <div class="dzn-wrap">    
                </div>
            </div>

            <div class="passport-wrap">
                <div class="donald"></div>
                <div class="passport"></div>
            </div>

        </section>

        <div class="spacer"></div>

        <div class="gif-container">
            <div class="gif-wrap empty">
            </div>

            <div class="gif-wrap">
                <img src="./assets/gifs/kr2.gif" alt="" class="gif" lazy-loading="true">
                <div class="subtitles">
                    <div class="marquee">
                        <p>Lorem Ipsum</p>
                    </div>
                </div>
                <img src="./assets/gifs/com-video-cutter-unscreen.gif" alt="" class="gif" lazy-loading="true">
            </div>
        </div>

        <div class="wrap">
            <!-- <div class="castle-bg">
            </div> -->
            <div class="hotel-el">
                <div class="hotel-bg"></div>
                <div class="hotel"></div>
            </div>

            <div class="svg-wrap">
                <!--super!-->
                <!-- <svg class="svg-fg" width="1200" height="1200">
                    <rect id="bg" x="0" y="0" width="1200" height="900" filter="url(#honeycomb)"/>
                    <rect id="bg" x="200" y="200" width="1200" height="900" filter="url(#honeycomb)" transform="scale(-1, 1)" transform-origin="center"/>
                    <rect id="patter" x="0" y="0" width="100%" height="100%" filter="url(#honeycomb)"/>
                </svg> -->
            </div>
        </div>

        <div class="horizontal-scroll-wrap">
            <div class="scroll-container">
                <div class="scroll-child">1</div>
                <div class="scroll-child">2</div>
                <div class="scroll-child">3</div>
            </div>
        </div>

        <script src="index.js"></script>
   </body>
</html>
